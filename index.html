<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NewsWave — Live Headlines</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0d0d0d;
      --cream: #f5f0e8;
      --rust: #c94a2b;
      --gold: #d4a843;
      --mist: #e8e2d8;
      --steel: #3a3a3a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

    header {
      background: var(--ink);
      border-bottom: 3px solid var(--rust);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .masthead {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -1px;
      color: var(--cream);
    }

    .dateline {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .filter-bar {
      background: var(--mist);
      border-bottom: 1px solid #d4cfc6;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem;
      border-radius: 2px;
      border: 1.5px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s ease;
      background: transparent;
      color: var(--steel);
    }
    .filter-btn:hover { background: var(--ink); color: var(--cream); }
    .filter-btn.active { background: var(--rust); color: #fff; border-color: var(--rust); }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.5px;
      background: #c8c2b8;
    }

    .card {
      background: var(--cream);
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: transform 0.2s ease;
    }
    .card:hover { transform: scale(1.01); z-index: 2; }

    .card-hero   { grid-column: span 8; min-height: 420px; }
    .card-side   { grid-column: span 4; min-height: 210px; }
    .card-medium { grid-column: span 6; min-height: 280px; }
    .card-small  { grid-column: span 4; min-height: 200px; }
    .card-strip  { grid-column: span 3; min-height: 200px; }

    @media (max-width: 900px) {
      .card-hero   { grid-column: span 12; min-height: 320px; }
      .card-side   { grid-column: span 6; min-height: 200px; }
      .card-medium { grid-column: span 6; min-height: 240px; }
      .card-small  { grid-column: span 6; min-height: 200px; }
      .card-strip  { grid-column: span 6; min-height: 180px; }
    }
    @media (max-width: 600px) {
      .card-hero, .card-side, .card-medium, .card-small, .card-strip {
        grid-column: span 12; min-height: 200px;
      }
    }

    .card-img {
      width: 100%; height: 55%;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .card:hover .card-img { transform: scale(1.04); }

    .card-body { padding: 1rem 1.1rem 1.2rem; }

    .card-source {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--rust); margin-bottom: 0.35rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700; line-height: 1.28; margin-bottom: 0.5rem;
    }
    .card-hero   .card-title { font-size: clamp(1.3rem, 2.5vw, 1.9rem); }
    .card-side   .card-title { font-size: 1.05rem; }
    .card-medium .card-title { font-size: 1.2rem; }
    .card-small  .card-title { font-size: 0.98rem; }
    .card-strip  .card-title { font-size: 0.9rem; }

    .card-desc {
      font-size: 0.82rem; color: var(--steel); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-hero .card-desc { -webkit-line-clamp: 4; font-size: 0.9rem; }

    .card-time { font-size: 0.65rem; color: #888; margin-top: 0.6rem; }

    .skeleton-block {
      background: linear-gradient(90deg, #e0dbd2 25%, #ccc7bd 50%, #e0dbd2 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 2px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .status-bar {
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #888; padding: 0.5rem 1.5rem;
      background: var(--mist); border-bottom: 1px solid #d4cfc6;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .live-dot {
      width: 7px; height: 7px; background: var(--rust);
      border-radius: 50%; display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .notice { grid-column: span 12; text-align: center; padding: 4rem 2rem; }
    .notice h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .notice p  { color: #888; font-size: 0.9rem; }

    .fade-in { animation: fadeUp 0.35s ease forwards; opacity: 0; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
  </style>
</head>
<body>

  <header>
    <div class="max-w-screen-xl mx-auto px-5 py-3 flex items-center justify-between">
      <div>
        <div class="masthead">NewsWave</div>
        <div class="dateline" id="dateline">Loading date…</div>
      </div>
      <div class="text-right hidden sm:block">
        <div class="text-xs text-gray-400 leading-relaxed">Live · Global · Unfiltered</div>
      </div>
    </div>
  </header>

  <div class="filter-bar sticky top-[70px] z-50">
    <div class="max-w-screen-xl mx-auto px-4 py-2 flex gap-2 items-center flex-nowrap">
      <button class="filter-btn active" data-category="general" data-country="us">🌐 Top News</button>
      <button class="filter-btn" data-category="business" data-country="us">📈 Business</button>
      <button class="filter-btn" data-category="technology" data-country="us">💻 Technology</button>
      <button class="filter-btn" data-category="science" data-country="us">🔬 Science</button>
      <button class="filter-btn" data-category="health" data-country="us">🏥 Health</button>
      <button class="filter-btn" data-category="entertainment" data-country="us">🎬 Entertainment</button>
      <button class="filter-btn" data-category="sports" data-country="us">⚽ Sports</button>
      <button class="filter-btn" data-query="apple" data-mode="everything">🍎 Apple</button>
      <button class="filter-btn" data-query="tesla" data-mode="everything">⚡ Tesla</button>
      <button class="filter-btn" data-query="AI artificial intelligence" data-mode="everything">🤖 AI</button>
    </div>
  </div>

  <div class="status-bar">
    <span class="live-dot"></span>
    <span id="status-text">Fetching headlines…</span>
  </div>

  <main class="max-w-screen-xl mx-auto p-2 md:p-3">
    <div class="news-grid" id="grid"></div>
  </main>

  <footer class="text-center py-8 text-xs text-gray-400 tracking-widest uppercase">
    Powered by NewsAPI &nbsp;·&nbsp; NewsWave &copy; 2026
  </footer>

<script>
  // ── All API calls go through the Netlify serverless proxy ──
  const PROXY = '/.netlify/functions/news';

  const now = new Date();
  document.getElementById('dateline').textContent =
    now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  const layoutCycle = ['card-hero','card-side','card-side','card-medium','card-medium','card-small','card-small','card-strip','card-strip','card-strip'];

  function getSizes(count) {
    return Array.from({length: count}, (_, i) => layoutCycle[i % layoutCycle.length]);
  }

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  function showSkeletons() {
    const grid = document.getElementById('grid');
    grid.innerHTML = Array.from({length: 6}, (_, i) => `
      <div class="card ${layoutCycle[i]} fade-in" style="animation-delay:${i*0.05}s">
        <div class="skeleton-block" style="height:55%;min-height:80px;"></div>
        <div class="card-body">
          <div class="skeleton-block" style="height:11px;width:35%;margin-bottom:10px;"></div>
          <div class="skeleton-block" style="height:20px;margin-bottom:8px;"></div>
          <div class="skeleton-block" style="height:14px;width:75%;"></div>
        </div>
      </div>`).join('');
  }

  function renderCards(articles) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (!articles || articles.length === 0) {
      grid.innerHTML = `<div class="notice"><h2>No stories found</h2><p>Try a different category.</p></div>`;
      return;
    }

    const sizes = getSizes(articles.length);

    articles.forEach((article, i) => {
      if (!article.title || article.title === '[Removed]') return;

      const card = document.createElement('div');
      card.className = `card ${sizes[i]} fade-in`;
      card.style.animationDelay = `${i * 0.04}s`;

      const img = article.urlToImage
        ? `<img class="card-img" src="${article.urlToImage}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div style="height:55%;min-height:80px;background:linear-gradient(135deg,#1a1a1a,#3a2a1a);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:2rem;font-family:'Playfair Display',serif;">NW</div>`;

      card.innerHTML = `
        ${img}
        <div class="card-body">
          <div class="card-source">${article.source?.name || 'Unknown'}</div>
          <div class="card-title">${article.title}</div>
          ${article.description ? `<div class="card-desc">${article.description}</div>` : ''}
          <div class="card-time">${timeAgo(article.publishedAt)}</div>
        </div>`;

      card.addEventListener('click', () => { if (article.url) window.open(article.url, '_blank'); });
      grid.appendChild(card);
    });
  }

  async function fetchNews(btn) {
    showSkeletons();
    document.getElementById('status-text').textContent = 'Loading…';

    // Build query params — the proxy forwards them to NewsAPI
    const params = new URLSearchParams({ pageSize: 20, language: 'en' });

    if (btn.dataset.mode === 'everything') {
      const yesterday = new Date(Date.now() - 2 * 86400000).toISOString().split('T')[0];
      params.set('q', btn.dataset.query);
      params.set('from', yesterday);
      params.set('sortBy', 'popularity');
    } else {
      params.set('country', btn.dataset.country || 'us');
      params.set('category', btn.dataset.category);
    }

    try {
      const resp = await fetch(`${PROXY}?${params}`);
      const data = await resp.json();

      if (data.status !== 'ok') throw new Error(data.message || 'API error');

      document.getElementById('status-text').textContent =
        `${(data.totalResults || 0).toLocaleString()} stories · Updated ${new Date().toLocaleTimeString()}`;
      renderCards(data.articles);
    } catch (err) {
      document.getElementById('status-text').textContent = 'Error loading news';
      document.getElementById('grid').innerHTML =
        `<div class="notice"><h2>Couldn't load stories</h2><p>${err.message}</p></div>`;
    }
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fetchNews(btn);
    });
  });

  fetchNews(document.querySelector('.filter-btn.active'));
</script>
</body>
</html>
